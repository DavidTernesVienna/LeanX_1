<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LeanX | Tactical Bodyweight</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#0a0a0a',
            'off-white': '#f8fafc',
            'gray-text': '#94a3b8',
            'gray-light': '#1e293b',
            'gray-dark': '#0f172a',
            accent: '#84cc16', // Tactical Lime/Olive
            'rest-orange': '#f97316', // Safety Orange
            'tactical-gray': '#334155',
          },
          fontFamily: {
            sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
            mono: ['"JetBrains Mono"', '"Roboto Mono"', 'monospace'],
          },
           keyframes: {
            'fade-in': {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'hud-scan': {
              '0%': { transform: 'translateY(-100%)' },
              '100%': { transform: 'translateY(100%)' },
            }
          },
          animation: {
            'fade-in': 'fade-in 0.3s ease-out forwards',
            'hud-scan': 'hud-scan 3s linear infinite',
          },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">

  }
}
</script>

</head>
